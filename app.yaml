# Databricks Apps Configuration
# Secret-backed env vars are wired via app-level resources (set in CI by
# `databricks apps update --json`), referenced here by `valueFrom: <resource-name>`.

command:
  - "sh"
  - "-c"
  - |
    pip install -r backend/requirements.txt && \
    uvicorn backend.main:app --host 0.0.0.0 --port 8000

env:
  - name: SOCRATA_APP_TOKEN
    valueFrom: socrata-app-token
  - name: SOCRATA_SECRET_TOKEN
    valueFrom: socrata-secret-token
  - name: SOCRATA_OAUTH_REDIRECT_URI
    valueFrom: socrata-oauth-redirect-uri
  - name: LLM_ENDPOINT
    valueFrom: llm-endpoint
  - name: LLM_API_KEY
    valueFrom: llm-api-key
  - name: LLM_MODEL
    valueFrom: llm-model
  - name: FRONTEND_URL
    valueFrom: frontend-url
  - name: VITE_API_BASE_URL
    valueFrom: vite-api-base-url
