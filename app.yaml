# Databricks Apps Configuration
# Secrets are pulled from the 'open-data-tool' Databricks secret scope.
# To add a new env var:
#   1. Add it to the GH Actions secret DATABRICKS_ENV_FILE
#   2. Add an entry under `env:` and a matching entry under `resources:` below

command:
  - "sh"
  - "-c"
  - |
    pip install -r backend/requirements.txt && \
    uvicorn backend.main:app --host 0.0.0.0 --port 8000

env:
  - name: SOCRATA_APP_TOKEN
    valueFrom: socrata-app-token
  - name: SOCRATA_APP_SECRET
    valueFrom: socrata-app-secret
  - name: SOCRATA_OAUTH_REDIRECT_URI
    valueFrom: socrata-oauth-redirect-uri
  - name: SESSION_ENCRYPTION_KEY
    valueFrom: session-encryption-key
  - name: FRONTEND_URL
    valueFrom: frontend-url
  - name: VITE_API_BASE_URL
    valueFrom: vite-api-base-url

resources:
  - name: socrata-app-token
    secret: { scope: open-data-tool, key: SOCRATA_APP_TOKEN, permission: READ }
  - name: socrata-app-secret
    secret: { scope: open-data-tool, key: SOCRATA_APP_SECRET, permission: READ }
  - name: socrata-oauth-redirect-uri
    secret: { scope: open-data-tool, key: SOCRATA_OAUTH_REDIRECT_URI, permission: READ }
  - name: session-encryption-key
    secret: { scope: open-data-tool, key: SESSION_ENCRYPTION_KEY, permission: READ }
  - name: frontend-url
    secret: { scope: open-data-tool, key: FRONTEND_URL, permission: READ }
  - name: vite-api-base-url
    secret: { scope: open-data-tool, key: VITE_API_BASE_URL, permission: READ }
