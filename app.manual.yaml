# Databricks Apps Configuration (Manual / Simple)
# Use this version if you want to manage secrets via a .env.databricks file
# instead of Databricks Secret Resources.

command:
  - "sh"
  - "-c"
  - |
    pip install -r backend/requirements.txt && \
    uvicorn backend.main:app --host 0.0.0.0 --port 8000

# No 'env:' section needed here if using .env.databricks.
# The backend automatically loads variables from .env.databricks in the root.
